version: "3.9"

services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./sentry.db:/app/sentry.db

  dashboard:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./sentry.db:/app/sentry.db
    command: ["python", "-m", "dashboard.main"]
    ports:
      - "8000:8000"
    depends_on:
      - bot
