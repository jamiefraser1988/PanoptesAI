<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resetting sign-in state…</title>
  </head>
  <body>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var returnUrl = params.get("return") || "/";
        var origin = window.location.origin;

        try {
          var target = new URL(returnUrl, origin);
          if (target.origin !== origin) {
            throw new Error("Cross-origin return URL not allowed");
          }
          window.location.replace(target.toString());
        } catch {
          window.location.replace(new URL("/", origin).toString());
        }
      })();
    </script>
  </body>
</html>
