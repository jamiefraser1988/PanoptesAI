<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="google-site-verification" content="KNtEnVOtmjRLiw-bbiynbkXW030WUtaXDQhlTxrNXDo" />
    <title>PanoptesAI</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      (function () {
        var LEGACY_HOST = "panoptesai.net";
        var CANONICAL_HOST = "www.panoptesai.net";
        var allowedHosts = [LEGACY_HOST, CANONICAL_HOST];

        if (allowedHosts.indexOf(window.location.hostname) === -1) {
          return;
        }

        if (window.location.hostname === LEGACY_HOST) {
          var canonicalUrl = new URL(window.location.href);
          canonicalUrl.hostname = CANONICAL_HOST;
          window.location.replace(canonicalUrl.toString());
          return;
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
