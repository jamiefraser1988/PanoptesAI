kind = "web"
previewPath = "/"
title = "PanoptesAI"
version = "1.0.0"
id = "artifacts/modarchitect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23695

[services.development]
run = "pnpm --filter @workspace/modarchitect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/modarchitect", "run", "build" ]
publicDir = "artifacts/modarchitect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
BASE_PATH = "/"
